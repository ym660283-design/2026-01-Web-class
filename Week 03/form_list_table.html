<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리스트·테이블·폼 예제</title>
  <link rel="stylesheet" href="form_list_table.css" />
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>HTML 리스트, 테이블, 폼 스타일 예제</h1>
      <p>한 페이지에서 리스트/테이블/폼을 모두 보여주며, CSS로 현대적인 스타일을 적용합니다.</p>
    </header>

    <section class="panel">
      <h2>1. 리스트 스타일</h2>
      <div class="box">
        <h3>기본 목록 (ul)</h3>
        <ul class="custom-list">
          <li>첫 번째 항목</li>
          <li>두 번째 항목</li>
          <li>세 번째 항목</li>
        </ul>
        <h3>순서 있는 목록 (ol)</h3>
        <ol class="custom-ol">
          <li>첫 번째</li>
          <li>두 번째</li>
          <li>세 번째</li>
        </ol>
      </div>
    </section>

    <section class="panel">
      <h2>2. 테이블 스타일</h2>
      <div class="box">
        <table class="styled-table">
          <thead>
            <tr>
              <th>제품</th>
              <th>수량</th>
              <th>가격</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>노트북</td>
              <td>2</td>
              <td>₩2,400,000</td>
            </tr>
            <tr>
              <td>무선 마우스</td>
              <td>5</td>
              <td>₩75,000</td>
            </tr>
            <tr>
              <td>키보드</td>
              <td>3</td>
              <td>₩120,000</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>3. 폼 스타일</h2>
      <div class="box">
        <form class="modern-form">
          <div class="field-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력하세요" />
          </div>
          <div class="field-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" />
          </div>
          <div class="field-group">
            <label for="country">국가</label>
            <select id="country" name="country">
              <option value="kr">대한민국</option>
              <option value="us">미국</option>
              <option value="jp">일본</option>
            </select>
          </div>
          <div class="field-group">
            <label for="message">메시지</label>
            <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력하세요"></textarea>
          </div>
          <div class="button-row">
            <button type="submit" class="btn primary">전송</button>
            <button type="reset" class="btn secondary">초기화</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</body>
</html>
