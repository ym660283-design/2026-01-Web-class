<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex 레이아웃: div vs Semantic</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }
    .page {
      max-width: 1000px;
      margin: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      padding: 1rem;
    }
    h1 { text-align: center; margin: 0 0 0.8rem; }
    .section {
      margin-bottom: 1rem;
      border-left: 4px solid #2563eb;
      padding-left: 0.7rem;
      margin-top: 0.7rem;
    }
    .label { font-size: 0.95rem; margin: 0.3rem 0 0.4rem; font-weight: 600; color: #1d4ed8; }
    .card {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      margin-bottom: 0.7rem;
      padding: 0.7rem;
    }
    .layout {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.95rem;
      background: #eef2ff;
      border: 1px dashed #93c5fd;
      border-radius: 6px;
      padding: 0.4rem;
    }
    .titlebar, .footer, .content, .aside, .nav {
      border: 1px solid #94a3b8;
      background: #e2e8f0;
      border-radius: 5px;
      padding: 0.5rem;
    }
    .titlebar { flex: 1 1 100%; background: #bfdbfe; }
    .menu { flex: 1 1 100%; display: flex; gap: 0.4rem; background: #f1f5f9; }
    .menu div { flex: 1; text-align: center; background: #dbeafe; border: 1px solid #93c5fd; border-radius: 4px; padding: 0.35rem; }
    .main-layout {
      flex: 1 1 100%;
      display: flex;
      gap: 0.5rem;
    }
    .content { flex: 3; background: #e0f2fe; }
    .aside { flex: 1; background: #e9f5e9; }
    .footer { flex: 1 1 100%; background: #ddd6fe; }

    .semantic-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: #f3f4f6;
      border: 1px dashed #a5b4fc;
      border-radius: 6px;
      padding: 0.4rem;
    }
    header, nav, main, aside, footer {
      border: 1px solid #94a3b8;
      border-radius: 5px;
      padding: 0.45rem;
      background: #f8fafc;
    }
    header { flex: 1 1 100%; background: #dbeafe; }
    nav { flex: 1 1 100%; display: flex; gap: 0.4rem; background: #f1f5f9; }
    nav a { flex: 1; text-align: center; text-decoration: none; color: #1d4ed8; border: 1px solid #93c5fd; border-radius: 4px; background: #dbeafe; padding: 0.3rem; }
    .semantic-main { flex: 3; background: #deebff; }
    aside { flex: 1; background: #e3fcef; }
    footer { flex: 1 1 100%; background: #ede9fe; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Flex 레이아웃 비교: div 전용 vs 시멘틱 태그</h1>

    <section class="section">
      <div class="label">1) div만 사용한 flex 레이아웃</div>
      <div class="card">
        <div class="layout">
          <div class="titlebar">제목줄 (div)</div>
          <div class="menu">
            <div>이동</div>
            <div>메뉴</div>
            <div>문서</div>
            <div>오른쪽</div>
            <div>추가문서</div>
          </div>
          <div class="main-layout">
            <div class="content">메인 콘텐츠 (div)</div>
            <div class="aside">오른쪽 사이드바 (div)</div>
          </div>
          <div class="footer">푸터 (div)</div>
        </div>
      </div>
      <div class="info">flex를 이용하면 같은 구조를 div만으로도 쉽게 구성할 수 있습니다.</div>
    </section>

    <section class="section">
      <div class="label">2) 시멘틱 태그를 사용한 동일 레이아웃</div>
      <div class="card">
        <div class="semantic-layout">
          <header>제목줄 (header)</header>
          <nav>
            <a href="#">이동</a>
            <a href="#">메뉴</a>
            <a href="#">문서</a>
            <a href="#">오른쪽</a>
            <a href="#">추가문서</a>
          </nav>
          <main class="semantic-main">메인 콘텐츠 (main)</main>
          <aside>오른쪽 사이드바 (aside)</aside>
          <footer>푸터 (footer)</footer>
        </div>
      </div>
      <div class="info">semantic 태그는 접근성과 문서 구조를 더 명확하게 만들어줍니다.</div>
    </section>
  </div>
</body>
</html>
