<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Image Example</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      text-align: center;
    }

    img {
      width: 280px;
      height: 180px;
      border: 1px solid #cccccc;
      display: block;
      margin: 20px auto;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>count로 이미지 변경하기</h1>
  <img id="photo" alt="변경되는 이미지">
  <button onclick="changeImage()">이미지 변경</button>
  <p id="status"></p>

  <script>
    // 버튼을 누른 횟수를 저장하는 변수입니다.
    let count = 1;

    // 첫 번째와 두 번째 이미지를 데이터 URL로 준비합니다.
    const firstImage = "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="280" height="180">
          <rect width="100%" height="100%" fill="#ffd166"/>
          <text x="50%" y="50%" font-size="28" text-anchor="middle" fill="#333" dy=".3em">첫 번째 이미지</text>
        </svg>
      `);

    const secondImage = "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="280" height="180">
          <rect width="100%" height="100%" fill="#90e0ef"/>
          <text x="50%" y="50%" font-size="28" text-anchor="middle" fill="#333" dy=".3em">두 번째 이미지</text>
        </svg>
      `);

    // count 값이 홀수인지 짝수인지에 따라 이미지를 바꿉니다.
    function changeImage() {
      const photo = document.getElementById("photo");
      const status = document.getElementById("status");

      if (count % 2 === 1) {
        photo.src = firstImage;
        status.textContent = count + "회 클릭: 첫 번째 이미지 출력";
      } else {
        photo.src = secondImage;
        status.textContent = count + "회 클릭: 두 번째 이미지 출력";
      }

      // 다음 클릭을 위해 count 값을 1 증가시킵니다.
      count++;
    }

    // 페이지가 열리면 처음 이미지를 바로 보여줍니다.
    changeImage();
  </script>
</body>
</html>
