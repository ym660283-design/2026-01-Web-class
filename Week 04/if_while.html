<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If and For Example</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #result {
      padding: 16px;
      border: 1px solid #cccccc;
      background-color: #f9f9f9;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>for문과 if문 예제</h1>
  <div id="result"></div>

  <script>
    let output = "";

    for (let i = 1; i <= 10; i++) {
      if (i % 2 === 0) {
        output += i + " : 짝수<br>";
      } else {
        output += i + " : 홀수<br>";
      }
    }

    document.getElementById("result").innerHTML = output;
  </script>
</body>
</html>
